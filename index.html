<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eidi Runner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            background-color: #0b0b0b;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            overflow: hidden;
            /* Block all native mobile scrolling completely */
        }

        #game-container {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            /* Bulletproof CSS letterbox scaling algorithm ensuring the 5:3 ratio never overflows */
            max-width: min(800px, 100vw, calc(100dvh * (800 / 480)));
            max-height: min(480px, 100dvh, calc(100vw * (480 / 800)));
            background-color: #87CEEB;
            /* Sky Blue Base */
            position: relative;
            overflow: hidden;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.9);
            border: 4px solid #222;
            border-radius: 4px;
            /* Prevent mobile zoom/scroll gestures */
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Premium HUD */
        #hud {
            position: absolute;
            top: 24px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }

        .hud-badge {
            background: rgba(0, 0, 128, 0.85);
            /* Navy translucent */
            color: yellow;
            padding: 12px 24px;
            border-radius: 30px;
            border: 3px solid yellow;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.3);
            text-shadow: 1px 1px 0 navy;
            display: flex;
            align-items: center;
        }

        /* Cinematic Start Screen Overlay */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 40, 0.65);
            /* Deep Navy dark */
            backdrop-filter: blur(6px);
            /* Premium blur */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
        }

        #title-img {
            max-width: 90%;
            max-height: 140px;
            object-fit: contain;
            margin-bottom: 5px;
            z-index: 25;
            /* Added a tiny shadow so it beautifully blends with the text shadow */
            filter: drop-shadow(3px 3px 0 navy) drop-shadow(5px 5px 0 rgba(0, 0, 0, 0.5));
        }

        #start-screen h1 {
            color: yellow;
            font-size: 64px;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 4px 4px 0 navy, 6px 6px 0 rgba(0, 0, 0, 0.6);
            letter-spacing: 2px;
            line-height: 1.1;
        }

        #start-screen p {
            color: #FFF;
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 40px;
            line-height: 1.6;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        /* Branded Button */
        button {
            background-color: navy;
            color: yellow;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 26px;
            padding: 16px 48px;
            border: 4px solid yellow;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            box-shadow: 0 8px 0 yellow, 0 15px 20px rgba(0, 0, 0, 0.4);
        }

        button:hover {
            transform: translateY(-4px);
            background-color: #000040;
            box-shadow: 0 12px 0 yellow, 0 20px 25px rgba(0, 0, 0, 0.5);
        }

        button:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 yellow, 0 0px 10px rgba(0, 0, 0, 0.4);
        }

        /* Essential Mobile Typography Scaling */
        @media (max-width: 600px),
        (max-height: 500px) {
            #title-img {
                max-height: 70px;
                margin-bottom: 2px;
            }

            #start-screen h1 {
                font-size: 36px;
                text-shadow: 2px 2px 0 navy;
            }

            #start-screen p {
                font-size: 13px;
                margin: 12px 0;
            }

            button {
                font-size: 16px;
                padding: 12px 28px;
                border-width: 3px;
            }

            .hud-badge {
                font-size: 12px;
                padding: 6px 12px;
                border-width: 2px;
            }

            #hud {
                top: 10px;
                padding: 0 10px;
            }

            #game-container {
                border-width: 2px;
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="480"></canvas>

        <!-- UI HUD -->
        <div id="hud">
            <div class="hud-badge" id="score-text">EIDI: 0</div>
            <div class="hud-badge" id="time-text">TIME: 60s</div>
        </div>

        <!-- Start Screen Overlay -->
        <div id="start-screen">
            <img src="imgs/eidi.png" alt="Eidi Logo" id="title-img">
            <h1>RUNNER</h1>
            <p>
                Press [SPACE] or TAP to Jump.<br>
                Avoid Pillars. Collect Eidi.<br>
                Run as far as you can!
            </p>
            <button id="start-btn">PLAY GAME</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>

</html>
